name: 💡 Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! For significant features (new integrations, data-model changes), it's worth discussing the approach here before opening a PR.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The user need or pain point - not the solution yet.
      placeholder: As a team lead, I can't… so I have to…
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you'd like to see happen.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches, workarounds, or prior art.
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Confirmations
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: This fits DecisionOS's scope - a focused decision system of record, not a general PM/wiki tool.
          required: false
