name: Publish images

# Build the production container images and publish them to the GitHub Container
# Registry (GHCR) so self-hosters can `docker pull` a ready-made build instead of
# building locally. Runs when a release is published or a version tag is pushed,
# and can be triggered by hand. It does not deploy anywhere: where and how to run
# the images is up to each operator (see docs/deployment/).

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]
  workflow_dispatch: {}

concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  # GHCR requires a lowercase namespace; github.repository_owner is used as-is.
  APP_IMAGE: ghcr.io/${{ github.repository_owner }}/decisionos-app
  MIGRATE_IMAGE: ghcr.io/${{ github.repository_owner }}/decisionos-migrate

jobs:
  build-push:
    name: Build & push images to GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derive image tags from the git ref. A version tag/release (v1.2.3) yields
      # `:1.2.3` and `:latest`; a manual run yields `:latest` and `:sha-<sha>` so
      # every build is still addressable.
      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.APP_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
            type=sha,prefix=sha-

      # Slim serving image (production deps only).
      - name: Build & push serving image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: runner
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # One-shot migrator image (full toolchain) that runs `prisma migrate deploy`
      # once per deploy before the app starts.
      - name: Compute migrator tags
        id: meta_migrate
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.MIGRATE_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build & push migrator image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: migrator
          push: true
          tags: ${{ steps.meta_migrate.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### Images published to GHCR" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ env.APP_IMAGE }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ env.MIGRATE_IMAGE }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Tags: \`${{ steps.meta.outputs.tags }}\`" >> "$GITHUB_STEP_SUMMARY"
