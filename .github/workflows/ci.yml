name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs on the same ref - the latest push is the one we care about.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: every job only reads the repo.
permissions:
  contents: read

jobs:
  verify:
    name: Lint, type-check, smoke tests & build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # The Prisma client is generated at predev/install time. CI doesn't run
      # a database, so we point at the bundled SQLite fixture and provide a
      # placeholder SESSION_SECRET that satisfies the >=32 char guard.
      DATABASE_URL: "file:./dev.db"
      SESSION_SECRET: "ci-placeholder-session-secret-aaaaaaaaaaaaaaaaaaaaaaaa"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "26"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client (SQLite for CI)
        run: node scripts/dev-db.mjs

      - name: TypeScript
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Smoke tests
        run: npm run test:smoke

      - name: Integration tests
        run: npm run test:integration

      - name: Build
        run: npm run build

  security:
    name: Dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "26"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Fails on high or critical advisories. Moderate/low are warnings only.
      # Review https://github.com/shafaypro/DecisionOS/security/advisories for details.
      - name: npm audit (high+)
        run: npm audit --audit-level=high

  docker:
    name: Docker image build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Verifies the multi-stage Dockerfile assembles: the slim serving image
      # (production deps only) and the one-shot migrator image.
      - name: Build serving image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runner
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build migrator image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: migrator
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
