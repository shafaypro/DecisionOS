<!doctype html>
<!-- ponytail: throwaway visual draft. Delete after review; real version goes in sidebar.tsx. -->
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AccountBlock draft</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { background:#eef1f6; }
  .rounded-xs { border-radius:4px; }
  .sidebar { width:224px; } /* w-56, matches real sidebar */
</style>
</head>
<body class="min-h-screen flex items-center justify-center gap-8 p-10 font-sans text-slate-900">

<!-- ============ VARIANT A: free tier, mid usage (the main draft) ============ -->
<div class="flex flex-col items-center gap-3">
  <span class="text-[11px] font-semibold tracking-wide text-slate-400">Free · in progress</span>
  <div class="sidebar rounded-xs bg-white p-2 shadow-[0_1px_3px_rgba(15,23,42,0.08)]">
    <div class="rounded-xs border border-slate-200/70 overflow-hidden">

      <!-- plan + usage region -->
      <div class="px-3 pt-3 pb-2.5">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-1.5">
            <span class="text-[11px] font-semibold tracking-wide text-slate-500">Free tier</span>
          </div>
          <span class="text-[11px] font-bold tabular-nums text-blue-600">86 / 200</span>
        </div>
        <div class="mt-2 h-1.5 overflow-hidden rounded-full bg-slate-200">
          <div class="h-full rounded-full bg-blue-600" style="width:43%"></div>
        </div>
        <p class="mt-1.5 text-[10px] text-slate-400">decisions logged</p>

        <a href="#" class="mt-2.5 flex w-full items-center justify-center gap-1.5 rounded-xs bg-blue-600 py-2 text-[11px] font-bold text-white transition hover:bg-blue-700">
          <svg class="h-3 w-3" viewBox="0 0 24 24" fill="currentColor"><path d="M13 2 3 14h7l-1 8 10-12h-7l1-8z"/></svg>
          Upgrade to Team
        </a>
      </div>

      <div class="border-t border-slate-100"></div>

      <!-- user row = the ListRow primitive (leading avatar / title / subtitle / trailing) -->
      <div class="group flex items-center px-2 py-2.5 transition-colors hover:bg-gray-50">
        <div class="flex h-7 w-7 shrink-0 items-center justify-center rounded-xs bg-blue-600 text-xs font-bold text-white">B</div>
        <div class="min-w-0 flex-1 px-2">
          <div class="truncate text-sm font-medium text-slate-900">bebra</div>
          <div class="truncate text-xs text-slate-400">tom@mailinator.com</div>
        </div>
        <button class="shrink-0 p-1 text-slate-400 transition-colors hover:text-slate-900" title="Log out">
          <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
        </button>
      </div>

    </div>
  </div>
</div>

<!-- ============ VARIANT B: near / at limit (same component, different account info) ============ -->
<div class="flex flex-col items-center gap-3">
  <span class="text-[11px] font-semibold tracking-wide text-slate-400">Limit reached</span>
  <div class="sidebar rounded-xs bg-white p-2 shadow-[0_1px_3px_rgba(15,23,42,0.08)]">
    <div class="rounded-xs border border-amber-200 overflow-hidden">

      <div class="px-3 pt-3 pb-2.5">
        <div class="flex items-center justify-between">
          <span class="text-[11px] font-semibold tracking-wide text-amber-600">Free tier</span>
          <span class="text-[11px] font-bold tabular-nums text-amber-600">200 / 200</span>
        </div>
        <div class="mt-2 h-1.5 overflow-hidden rounded-full bg-amber-100">
          <div class="h-full rounded-full bg-amber-500" style="width:100%"></div>
        </div>
        <p class="mt-1.5 text-[10px] text-amber-600">limit reached - upgrade to keep logging</p>

        <a href="#" class="mt-2.5 flex w-full items-center justify-center gap-1.5 rounded-xs bg-blue-600 py-2 text-[11px] font-bold text-white transition hover:bg-blue-700">
          <svg class="h-3 w-3" viewBox="0 0 24 24" fill="currentColor"><path d="M13 2 3 14h7l-1 8 10-12h-7l1-8z"/></svg>
          Upgrade to Team
        </a>
      </div>

      <div class="border-t border-slate-100"></div>

      <div class="group flex items-center px-2 py-2.5 transition-colors hover:bg-gray-50">
        <div class="flex h-7 w-7 shrink-0 items-center justify-center rounded-xs bg-blue-600 text-xs font-bold text-white">B</div>
        <div class="min-w-0 flex-1 px-2">
          <div class="truncate text-sm font-medium text-slate-900">bebra</div>
          <div class="truncate text-xs text-slate-400">tom@mailinator.com</div>
        </div>
        <button class="shrink-0 p-1 text-slate-400 transition-colors hover:text-slate-900" title="Log out">
          <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
        </button>
      </div>

    </div>
  </div>
</div>

<!-- ============ VARIANT C: paid plan (no usage bar, just status) ============ -->
<div class="flex flex-col items-center gap-3">
  <span class="text-[11px] font-semibold tracking-wide text-slate-400">Team plan</span>
  <div class="sidebar rounded-xs bg-white p-2 shadow-[0_1px_3px_rgba(15,23,42,0.08)]">
    <div class="rounded-xs border border-slate-200/70 overflow-hidden">

      <div class="flex items-center justify-between px-3 py-2.5">
        <span class="text-[11px] font-semibold tracking-wide text-slate-500">Team plan</span>
        <span class="rounded-full bg-blue-50 px-2 py-0.5 text-[10px] font-bold text-blue-600">Active</span>
      </div>

      <div class="border-t border-slate-100"></div>

      <div class="group flex items-center px-2 py-2.5 transition-colors hover:bg-gray-50">
        <div class="flex h-7 w-7 shrink-0 items-center justify-center rounded-xs bg-blue-600 text-xs font-bold text-white">B</div>
        <div class="min-w-0 flex-1 px-2">
          <div class="truncate text-sm font-medium text-slate-900">bebra</div>
          <div class="truncate text-xs text-slate-400">tom@mailinator.com</div>
        </div>
        <button class="shrink-0 p-1 text-slate-400 transition-colors hover:text-slate-900" title="Log out">
          <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
        </button>
      </div>

    </div>
  </div>
</div>

</body>
</html>
