# Template - replace values before applying, or use external-secrets-operator
# to sync from AWS Secrets Manager / GCP Secret Manager / Vault.
#
# Generate values:
#   echo -n "$(openssl rand -hex 32)" | base64
apiVersion: v1
kind: Secret
metadata:
  name: decisionos-secrets
  namespace: decisionos
  labels:
    app.kubernetes.io/name: decisionos
type: Opaque
data:
  SESSION_SECRET: "REPLACE_WITH_BASE64"
  DATABASE_URL: "REPLACE_WITH_BASE64"
  REDIS_URL: "REPLACE_WITH_BASE64"
  CRON_SECRET: "REPLACE_WITH_BASE64"
  # Optional - remove if not using
  # SMTP_PASS: ""
  # SLACK_CLIENT_SECRET: ""
  # SLACK_SIGNING_SECRET: ""
  # ANTHROPIC_API_KEY: ""
